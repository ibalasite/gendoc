      - heading "Quick Start" [level=2] [ref=e145]
      - heading "Install (macOS / Linux / WSL)" [level=3] [ref=e146]
      - code [ref=e148]: "# 1. Clone git clone https://github.com/ibalasite/gendoc.git ~/projects/gendoc # 2. Install skills + register auto-update hook cd ~/projects/gendoc && ./setup # 3. Restart Claude Code — skills are now available"
      - heading "Install (Windows native)" [level=3] [ref=e149]
      - code [ref=e151]: "# Requires: Git for Windows + Python 3 git clone https://github.com/ibalasite/gendoc.git ~/projects/gendoc cd ~/projects/gendoc .\\setup.ps1"
      - heading "Uninstall" [level=3] [ref=e152]
      - code [ref=e154]: "~/projects/gendoc/setup --uninstall # macOS/Linux # Or: .\\setup.ps1 -Uninstall # Windows"
      - separator [ref=e155]
      - heading "Usage" [level=2] [ref=e156]
      - code [ref=e158]: "# Generate a single document (reads templates automatically) /gendoc edd /gendoc brd /gendoc runbook # Review a document with iterative fix loop /reviewdoc edd /reviewdoc runbook # Full pipeline (interactive) /gendoc-config # set mode: interactive or full-auto /gendoc-auto # run all docs sequentially # Manual upgrade /gendoc-update"
      - separator [ref=e159]
      - heading "Auto-Update" [level=2] [ref=e160]
      - paragraph [ref=e161]:
        - text: After
        - code [ref=e162]: ./setup
        - text: ", a"
        - strong [ref=e163]: SessionStart hook
        - text: is registered in
        - code [ref=e164]: ~/.claude/settings.json
        - text: . Every time Claude Code starts a session, the harness automatically runs
        - code [ref=e165]: git pull + install
        - text: in the background (throttled to once per hour). No LLM involvement — 100% reliable.
      - code [ref=e167]: Session start → harness triggers hook → git pull (background) → skills updated
      - paragraph [ref=e168]:
        - text: "Manual update:"
        - code [ref=e169]: /gendoc-update
        - text: or
        - code [ref=e170]: ~/projects/gendoc/bin/gendoc-upgrade
      - separator [ref=e171]
      - heading "Template Architecture" [level=2] [ref=e172]
      - code [ref=e174]: "templates/ ├── <TYPE>.md ← document structure skeleton ├── <TYPE>.gen.md ← AI generation rules (Iron Law: must be read first) └── <TYPE>.review.md ← review criteria & quality gates"
      - paragraph [ref=e175]:
        - text: The
        - strong [ref=e176]: Iron Law
        - text: ": no document is generated without reading both"
        - code [ref=e177]: TYPE.md
        - text: AND
        - code [ref=e178]: TYPE.gen.md
        - text: first. Templates are the single source of truth — editing a template immediately changes behavior of all
        - code [ref=e179]: /gendoc
        - text: and
        - code [ref=e180]: /reviewdoc
        - text: calls.
